name: CI/CD deteksi-phishing-url

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (py_compile) via project venv
        run: |
          /var/www/deteksi-phishing-url/venv/bin/python -m py_compile \
            app.py utils/__init__.py utils/*.py scripts/*.py

      - name: Smoke import app (load model + data)
        run: |
          cd /var/www/deteksi-phishing-url
          /var/www/deteksi-phishing-url/venv/bin/python -c "import app; print('app import OK')"

  # ---------- DEPLOY LOKAL (self-hosted, mesin yg sama) ----------
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Deploy (git pull + deps + restart + health)
        run: |
          set -e
          APP_DIR=/var/www/deteksi-phishing-url
          VENV="$APP_DIR/venv"
          cd "$APP_DIR"

          echo "[*] Git pull..."
          git pull origin main
          git checkout main

          echo "[*] Install/update deps..."
          "$VENV/bin/pip" install -r requirements.txt
          "$VENV/bin/python" -m playwright install chromium

          echo "[*] Restart service (via sudo NOPASSWD)..."
          sudo systemctl restart phishing-app
          sleep 3

          echo "[*] Health check..."
          if curl -fsS http://127.0.0.1:8000/api/feature-labels >/dev/null; then
            echo "HEALTH_OK"
          else
            echo "HEALTH_WARN - cek: journalctl -u phishing-app -n 50"
            exit 1
          fi
          echo "[+] Deploy selesai."
